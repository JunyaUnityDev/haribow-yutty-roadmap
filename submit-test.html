<!DOCTYPE html><html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>提出ボタン テスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600&display=swap" rel="stylesheet">
<style>
:root{--ink:#1d1d1f;--grey:#6e6e73;--line:#e8e6e3;--accent:#C68B6B;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans JP",sans-serif;color:var(--ink);background:#F8F5F0;line-height:1.8}
.wrap{max-width:520px;margin:0 auto;padding:40px 22px}
h1{font-family:"Noto Serif JP",serif;font-weight:600;font-size:24px;margin-bottom:8px}
.note{color:var(--grey);font-size:14px;font-weight:400;margin-bottom:22px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px}
label{display:block;font-size:13px;font-weight:700;color:var(--grey);margin:16px 0 8px}
label:first-child{margin-top:0}
input{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:16px;font-family:inherit}
.techs{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid var(--line);background:#fff;border-radius:99px;padding:8px 15px;font-size:14px;cursor:pointer;color:#3a3a3c}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.preview{margin:18px 0 6px;font-size:14px;color:var(--grey)}
.preview b{color:var(--ink);font-size:16px}
.go{width:100%;border:none;background:#06c755;color:#fff;border-radius:12px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px}
.hint{color:var(--grey);font-size:12.5px;font-weight:400;margin-top:14px;line-height:1.7}
</style></head>
<body><div class="wrap">
<h1>提出ボタン テスト</h1>
<p class="note">サイトの「提出する」を押すと、技名つきで公式LINEが開くか試すページです。</p>
<div class="card">
  <label>① 公式LINEの ID（@から始まるやつ）</label>
  <input id="oaid" placeholder="例：@446ponkn" autocapitalize="off" autocorrect="off">
  <label>② 今日の技</label>
  <div class="techs" id="techs"></div>
  <div class="preview">LINEに入る文：<b id="msg">動画提出：オーヴ</b></div>
  <button class="go" id="go">▶ 提出する（LINEを開く）</button>
  <p class="hint">スマホでこのページを開いて押すと、LINEアプリが「動画提出：◯◯」入りで開きます。あとは送信して、動画を添付するだけ。<br>※ @IDは一度入れると、この端末に記憶されます。</p>
</div>
</div>
<script>
const STEPS=["オーヴ","スライド","ペダル","3ステップ","ヒールロック","ラグジャンプ"];
let tech="オーヴ";
const oaid=document.getElementById("oaid");
oaid.value=localStorage.getItem("oa_id")||"@578mjivx";
oaid.oninput=()=>localStorage.setItem("oa_id",oaid.value.trim());
const techs=document.getElementById("techs");
function draw(){
  techs.innerHTML="";
  STEPS.forEach(t=>{const b=document.createElement("button");b.className="chip"+(t===tech?" on":"");b.textContent=t;b.onclick=()=>{tech=t;document.getElementById("msg").textContent="動画提出："+tech;draw();};techs.appendChild(b);});
}
draw();
document.getElementById("go").onclick=()=>{
  const id=oaid.value.trim();
  if(!id){alert("公式LINEの @ID を入れてください（@から始まるもの）");return;}
  const text="動画提出："+tech;
  location.href="https://line.me/R/oaMessage/"+encodeURIComponent(id)+"/?"+encodeURIComponent(text);
};
</script>
</body></html>
